<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ravyn - Tu Experiencia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Varela+Round&family=Quicksand:wght@300;500;700&family=Inter:wght@300;400;500&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="estilos_tarjetas.css">
    
    <style>
    /* =========================================================
       1. REGLA DE ORO: CONTROL TOTAL DE TAMAÑOS
       ========================================================= */
    * { 
        box-sizing: border-box !important; 
        max-width: 100vw; /* NADIE supera el ancho de la pantalla */
    }

    body {
        overflow-x: hidden !important; 
        width: 100vw;
    }

    .oculto { display: none !important; }

    /* --- EL SECRETO PARA LA SEPARACIÓN PERFECTA --- */
    .modulo-ravyn {
        min-height: 100dvh; /* dvh adapta la altura real del celular */
        position: relative;
        width: 100%;
        padding: 80px 0; /* ESTO ES LA MAGIA: 80px de aire arriba y abajo de cada módulo */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    /* Evitamos que el módulo de tarjetas duplique la altura de la pantalla */
    #modulo-tarjetas #app-container {
        min-height: auto !important;
        height: 100% !important;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-bottom: 0 !important;
    }

    /* Aseguramos que el contenido interno tome el 100% del ancho permitido */
    .modulo-ravyn > * {
        width: 100%;
    }

    /* =========================================================
       2. RESTRICCIÓN ABSOLUTA DEL MODAL
       ========================================================= */
    .modal-content {
        width: 90vw !important; 
        max-width: 450px !important; 
        max-height: 80dvh !important; 
        padding: 20px !important;
        margin: auto !important;
        overflow-y: auto !important; 
        overflow-x: hidden !important;
    }

    .modal-image {
        width: 100% !important;
        height: auto !important;
        max-height: 35dvh !important; 
        object-fit: cover !important; 
        border-radius: 12px !important;
        margin-bottom: 15px !important;
        pointer-events: none;
    }

    #modal-title { font-size: 1.4rem !important; margin-bottom: 5px !important; }
    #modal-text { font-size: 1rem !important; line-height: 1.4 !important; }

    /* =========================================================
       3. FIX DEL REPRODUCTOR "ATASCADO"
       ========================================================= */
    #reproductor-flotante {
        transform: translateZ(0);
        will-change: transform;
    }

    @media (max-width: 600px) {
        #reproductor-flotante {
            width: calc(100vw - 40px) !important; 
            bottom: 15px !important;
            right: 20px !important;
        }
    }
    </style>
</head>
<body>

    <section id="modulo-historia" class="modulo-ravyn oculto">
        <header class="page-header">
            <h1 id="main-title" class="header-title">Cargando...</h1>
            <p id="main-subtitle" class="header-subtitle easter-egg-trigger">Cargando...</p>
        </header>

        <main id="history-gallery" class="gallery-container"></main>

        <div id="moment-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <img id="modal-img" src="" alt="Momento" class="modal-image">
                <div class="modal-details">
                    <h2 id="modal-title" class="card-title">Cargando...</h2>
                    <div class="modal-meta">
                        <span id="modal-date"></span> | <span id="modal-location"></span>
                    </div>
                    <hr class="pixel-divider">
                    <p id="modal-text" class="card-description">Cargando...</p>
                </div>
            </div>
        </div>
    </section>

    <section id="modulo-trivia" class="modulo-ravyn fondo-trivia oculto">
        <div id="trivia-module" class="trivia-card">
            
            <div id="trivia-intro" class="fade-transition">
                <h1 class="header-title" style="margin-bottom: 10px; font-size: 2.5rem;">Nuestra Trivia</h1>
                <p id="intro-message" class="intro-text">Cargando...</p>
                <button id="start-btn" class="option-btn">Empezar a jugar</button>
            </div>

            <div id="trivia-game" class="hidden fade-transition">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                
                <div id="question-container" class="fade-transition">
                    <h2 id="question-text" class="question-header">Pregunta</h2>
                    <div id="options-grid" class="options-grid"></div>
                </div>
            </div>

            <div id="trivia-results" class="hidden fade-transition">
                <h2 id="final-score" class="header-title" style="margin-bottom: 10px;"></h2>
                <p id="final-message" class="intro-text"></p>
                <button id="restart-btn" class="option-btn">Volver a jugar</button>
            </div>
            
        </div>
    </section>

    <section id="modulo-tarjetas" class="modulo-ravyn oculto">
        <main id="app-container">
            <section id="escena-sobre" class="escena activa">
                <h1 id="mensaje-inicio">Cargando...</h1>
                <div id="paquete-cartas" class="paquete">
                    <div class="pestillo">?</div>
                    <div class="destello"></div>
                </div>
            </section>

            <section id="escena-cartas" class="escena oculta">
                <div id="stack-container"></div>
            </section>

            <section id="escena-final" class="escena oculta">
                <h2 id="mensaje-final" style="color: white; font-family: sans-serif; margin-bottom: 20px;">Has leído todas las cartas</h2>
                <button id="btn-reiniciar">Volver a leer</button>
            </section>
        </main>
    </section>
    <section id="modulo-evasivo" class="modulo-ravyn oculto">
        <div id="carta-evasiva" class="memory-card" style="text-align: center; padding: 60px 20px; max-width: 700px; width: 90%; min-height: 450px; position: relative; z-index: 10; display: flex; flex-direction: column;">
            
            <div id="evasivo-contenido" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h2 id="evasivo-pregunta" class="card-title" style="font-size: 2.5rem; margin-bottom: 30px;">¿...?</h2>
                
                <div id="contenedor-botones" style="position: relative; flex-grow: 1; min-height: 250px; width: 100%;">
                    <button id="btn-si" class="option-btn" style="position: absolute; left: 15%; top: 20px; width: 130px; font-size: 1.2rem;">Sí</button>
                    <div id="btn-no" class="option-btn" style="position: absolute; right: 15%; top: 20px; width: 130px; font-size: 1.2rem; transition: all 0.15s ease-out; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none;">No</div>
                </div>
            </div>

            <div id="evasivo-exito" class="oculto" style="margin: auto 0;">
                <h2 class="card-title" style="font-size: 2.5rem; color: #ff4757;">¡Sabía que dirías que sí!</h2>
                <p id="evasivo-mensaje-final" class="card-description" style="margin-top: 15px; font-size: 1.5rem;">Misión cumplida.</p>
            </div>

        </div>
    </section>

    <section id="modulo-contador" class="modulo-ravyn oculto">
        <div class="memory-card" style="text-align: center; padding: 40px 20px; max-width: 600px; width: 90%; position: relative; z-index: 10;">
            
            <h2 id="contador-titulo" class="card-title" style="font-size: 2.5rem; margin-bottom: 10px;">Nuestro Tiempo</h2>
            <p id="contador-mensaje" class="card-description" style="margin-bottom: 30px; font-size: 1.2rem;">Cada segundo cuenta...</p>

            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
                <div style="background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; min-width: 90px; backdrop-filter: blur(5px);">
                    <span id="cont-anios" style="font-size: 3rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Años</span>
                </div>
                <div style="background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; min-width: 90px; backdrop-filter: blur(5px);">
                    <span id="cont-meses" style="font-size: 3rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Meses</span>
                </div>
                <div style="background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; min-width: 90px; backdrop-filter: blur(5px);">
                    <span id="cont-dias" style="font-size: 3rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Días</span>
                </div>
            </div>

            <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; min-width: 70px;">
                    <span id="cont-horas" style="font-size: 1.8rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.7rem; text-transform: uppercase;">Horas</span>
                </div>
                <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; min-width: 70px;">
                    <span id="cont-minutos" style="font-size: 1.8rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.7rem; text-transform: uppercase;">Min</span>
                </div>
                <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; min-width: 70px;">
                    <span id="cont-segundos" style="font-size: 1.8rem; font-weight: bold; display: block; line-height: 1;">00</span>
                    <span style="font-size: 0.7rem; text-transform: uppercase;">Seg</span>
                </div>
            </div>

        </div>
    </section>

    <div id="reproductor-flotante" class="oculto">
        <div id="marco-reproductor">
            <div id="reproductor-contenedor"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> 
    <script src="reproductor.js"></script>
    <script src="app.js"></script>
    <script src="trivia.js"></script>
    <script src="tarjetas.js"></script>
    <script src="evasivo.js"></script> <script src="core.js"></script>
    <script src="contador.js"></script> <script src="core.js"></script>
 
    <script src="core.js"></script>

</body>
</html>
